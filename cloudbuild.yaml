steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/intervyou-live', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/intervyou-live']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'intervyou-live'
      - '--image=gcr.io/$PROJECT_ID/intervyou-live'
      - '--platform=managed'
      - '--region=asia-southeast1'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--timeout=900'
      - '--session-affinity'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-env-vars=GEMINI_API_KEY=${_GEMINI_API_KEY},JWT_SECRET=${_JWT_SECRET}'
images:
  - 'gcr.io/$PROJECT_ID/intervyou-live'
substitutions:
  _GEMINI_API_KEY: ''
  _JWT_SECRET: ''
